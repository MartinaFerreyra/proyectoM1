<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de paletas de colores</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

<body>

<header class="contenedor-header">
  <h1>Generador de paletas</h1>
  </header>

 <!-- CONTROLES -->
    <section class="controls">

      <!-- CANTIDAD -->
      <div class="control-grupo">

        <label for="cantidad">
          Cantidad
        </label>

        <select id="cantidad">

          <option value="6">
            6 colores
          </option>

          <option value="8" selected>
            8 colores
          </option>

          <option value="9">
            9 colores
          </option>

        </select>

      </div>

      <!-- FORMATO -->
      <div class="control-grupo">

        <label for="formato">
          Formato
        </label>

        <select id="formato">

          <option value="hex">
            HEX
          </option>

          <option value="hsl">
            HSL
          </option>

        </select>

      </div>

      <!-- MODO -->
      <div class="control-grupo">

        <label for="modo">
          Tipo
        </label>

        <select id="modo">

          <option value="random">
            Aleatorio
          </option>


        </select>

      </div>

    </section>

<main class="contenedor-main">

 <!-- CONTENEDOR DINÁMICO -->
    <section
      class="palette-container"
      id="paletteContainer">
    </section>

    <!-- BOTÓN -->
    <button id="generar-paleta">
      Generar paleta
    </button>

    <!-- TOOLTIP -->
    <div class="tooltip">
      Color copiado
    </div>

  </main>

<script src="./js/index.js"></script>
</body>
</html>
